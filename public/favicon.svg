<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#f97316"/>

  <!-- ── Neural network: 3 → 2 → 1 architecture ── -->

  <!-- Layer connections (input → hidden) -->
  <line x1="12" y1="12" x2="26" y2="18" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="12" x2="26" y2="30" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="24" x2="26" y2="18" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="24" x2="26" y2="30" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="36" x2="26" y2="18" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="36" x2="26" y2="30" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Layer connections (hidden → output) -->
  <line x1="26" y1="18" x2="38" y2="24" stroke="white" stroke-width="1.5" stroke-opacity="0.9"/>
  <line x1="26" y1="30" x2="38" y2="24" stroke="white" stroke-width="1.5" stroke-opacity="0.9"/>

  <!-- Input layer nodes (3) -->
  <circle cx="12" cy="12" r="3.2" fill="white"/>
  <circle cx="12" cy="24" r="3.2" fill="white"/>
  <circle cx="12" cy="36" r="3.2" fill="white"/>

  <!-- Hidden layer nodes (2) -->
  <circle cx="26" cy="18" r="3.2" fill="white"/>
  <circle cx="26" cy="30" r="3.2" fill="white"/>

  <!-- Output node (1) — slightly larger, the "architect" result -->
  <circle cx="38" cy="24" r="4" fill="white"/>
  <!-- Inner dot on output to mark it as the key node -->
  <circle cx="38" cy="24" r="1.8" fill="#f97316"/>
</svg>
